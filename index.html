<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boda Estefany & Jesús</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="brand">
        <span class="brand-logo">◎</span>
        <span class="brand-text">Boda Estefany &amp; Jesús</span>
      </div>
      <nav class="nav">
        <button id="nav-upload" class="nav-btn nav-btn-active">Subir foto</button>
        <button id="nav-carousel" class="nav-btn">Carrusel</button>
      </nav>
    </header>

    <main class="app-main">
      <div class="view-stack">
      <section id="view-upload" class="view view-active">
        <div class="card">
          <div class="card-header-row">
            <div>
              <h1 class="card-title">Agregar foto</h1>
              <p class="card-subtitle">
                Toma una foto, agrega una descripción para verla en el carrusel.
              </p>
            </div>
            <img src="marca.png" alt="Marca" class="brand-mark" />
          </div>

          <form id="upload-form" class="form" novalidate>
            <div class="form-group">
              <label for="photo-input" class="form-label">Foto</label>
              <div id="file-input-wrapper" class="file-input-wrapper">
                <input
                  id="photo-input"
                  type="file"
                  accept="image/*"
                  capture="environment"
                  class="file-input"
                />
                <span class="file-input-label">
                  Tomar foto
                  <svg
                    class="file-input-icon"
                    viewBox="0 0 24 24"
                    width="18"
                    height="18"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path
                      d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"
                    />
                    <circle cx="12" cy="13" r="4" />
                  </svg>
                </span>
              </div>
              <div id="photo-preview-container" class="photo-preview hidden">
                <img id="photo-preview" alt="Vista previa" />
              </div>
            </div>

            <div class="form-group">
              <label for="description-input" class="form-label">Descripción</label>
              <textarea
                id="description-input"
                class="textarea"
                placeholder="Escribe una nota o descripción para esta foto..."
                rows="3"
              ></textarea>
              <p id="description-counter" class="field-hint"></p>
            </div>

            <div class="form-actions">
              <button type="submit" class="btn-primary" id="upload-submit" aria-busy="false">
                <span class="btn-spinner" aria-hidden="true"></span>
                <span class="btn-text">Guardar foto</span>
              </button>
            </div>

            <div class="message-row">
              <p id="upload-message" class="message"></p>
            </div>
          </form>
        </div>
      </section>

      <section id="view-carousel" class="view">
        <div class="card card-full">
          <div class="card-header-row">
            <div>
              <h1 class="card-title">Mi carrusel</h1>
            </div>
          </div>

          <div id="empty-state" class="empty-state">
            <div class="empty-icon">📷</div>
            <p class="empty-title">Aún no hay fotos</p>
            <p class="empty-text">Sube tu primera foto en la pestaña "Subir foto".</p>
          </div>

          <div id="carousel-container" class="carousel hidden">
            <div class="carousel-image-wrapper">
              <img id="carousel-image" alt="Foto del carrusel" />
              <button id="btn-fullscreen" class="btn-icon" type="button" aria-label="Ver en pantalla completa">
                ⤢
              </button>
              <div class="carousel-badge">
                <span id="carousel-index">1</span>
                <span>/</span>
                <span id="carousel-total">1</span>
              </div>
            </div>
            <div class="carousel-info">
              <p id="carousel-description" class="carousel-description"></p>
              <p id="carousel-date" class="carousel-date"></p>
            </div>

            <div class="carousel-controls">
              <button id="btn-prev" class="btn-secondary" type="button">Anterior</button>
              <button id="btn-play" class="btn-secondary" type="button">Reproducir</button>
              <button id="btn-next" class="btn-secondary" type="button">Siguiente</button>
            </div>
          </div>
        </div>
      </section>
      </div>
    </main>

    <footer class="app-footer"></footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
